# Render Blueprint for CodePilot AI Backend
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: codepilot-ai-backend
    env: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: codepilot-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: codepilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false

databases:
  # PostgreSQL Database
  - name: codepilot-db
    databaseName: codepilot_production
    plan: starter
    region: oregon
    postgresMajorVersion: 15

